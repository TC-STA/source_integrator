name: 打包成EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller -F source_integrator.py
      - uses: actions/upload-artifact@v4
        with:
          name: my-exe-file
          path: dist/*.exe
